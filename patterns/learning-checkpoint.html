<section class="ap-learning-checkpoint" data-ap-learning-checkpoint>
  <p class="section-label">Learning Checkpoint</p>
  <h2>Do you see the system more clearly?</h2>
  <p>This is not a rating. It is a reflection on understanding.</p>
  <div class="ap-learning-options">
    <button type="button" data-ap-reflection="yes">Yes</button>
    <button type="button" data-ap-reflection="thinking">I'm still thinking</button>
    <button type="button" data-ap-reflection="notYet">Not yet</button>
  </div>
  <p class="ap-learning-response" data-ap-learning-response></p>
</section>
