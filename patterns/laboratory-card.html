<!--
  AP Pattern: Laboratory Card
  Purpose: A laboratory card does not advertise a project. It explains what idea is being tested, where it is being applied, and what evidence the artifact provides.
-->
<article class="ap-lab-card">
  <span class="ap-lab-status">In Development</span>
  <div>
    <p class="card-label">Builder Laboratory · Tooling</p>
    <h3>Laboratory Name</h3>
  </div>
  <p class="ap-lab-question">What system question does this laboratory test?</p>
  <p><strong>Thesis:</strong> What belief is being tested?</p>
  <p><strong>Application:</strong> Where does the idea become practical?</p>
  <p><strong>Evidence:</strong> What artifact proves the idea can survive implementation?</p>
  <div class="ap-lab-meta">
    <span class="ap-lab-pill">connection</span>
  </div>
</article>
