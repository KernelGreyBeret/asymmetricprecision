<!-- AP Content Page Pattern
Principle: Legacy content must be brought into the system it helped create.
Use this pattern for individual essay/book/framework detail pages. -->
<main class="ap-content-page" data-ap-page="content-detail" data-ap-layer="thinking">
  <section class="page-hero ap-content-hero">
    <p class="eyebrow">Content Type / Sequence</p>
    <h1>Title</h1>
    <p class="page-intro">What this content helps the reader see more clearly.</p>
  </section>
  <section class="ap-content-metadata-surface">...</section>
  <article class="ap-readable-surface">...</article>
</main>
