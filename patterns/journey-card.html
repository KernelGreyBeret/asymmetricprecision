<!--
  AP Pattern: Journey Card
  Purpose: Present a guided route through AP based on responsibility, question, or pressure point.
  Principle: A journey is not a funnel. A journey increases understanding.
-->
<article class="ap-journey-card">
  <p class="card-label">Learning Journey</p>
  <h2>Journey Title</h2>
  <p class="ap-journey-signal">The condition, responsibility, or pressure that makes this path relevant.</p>
  <p class="ap-journey-question">The core question this journey helps answer.</p>
  <ol class="ap-route">
    <li class="ap-route-step"><span class="ap-route-index">1</span><span class="ap-route-body"><span class="ap-route-label">Begin</span><a class="ap-route-title" href="#">First node</a></span></li>
  </ol>
</article>
